---
- name: Deploy Uptime Kuma
  hosts: homelab
  become: no

  tasks:
    - name: Create Uptime Kuma config directory
      become: yes
      file:
        path: /mnt/uptimekuma
        state: directory
        owner: shunya
        group: shunya
        mode: '0755'

    - name: Deploy Uptime Kuma
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: uptime-kuma
          namespace: tools
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: uptime-kuma
          template:
            metadata:
              labels:
                app: uptime-kuma
            spec:
              containers:
                - name: uptime-kuma
                  image: louislam/uptime-kuma:1
                  ports:
                    - containerPort: 3001
                  volumeMounts:
                    - name: data
                      mountPath: /app/data
              volumes:
                - name: data
                  hostPath:
                    path: /mnt/uptimekuma
                    type: Directory
        YAML

    - name: Create Uptime Kuma service
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: v1
        kind: Service
        metadata:
          name: uptime-kuma
          namespace: tools
        spec:
          selector:
            app: uptime-kuma
          ports:
            - port: 3001
              targetPort: 3001
          type: ClusterIP
        YAML

    - name: Create Uptime Kuma IngressRoute
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: uptime-kuma
          namespace: tools
        spec:
          entryPoints:
            - web
          routes:
            - match: Host(\`uptime.local\`)
              kind: Rule
              services:
                - name: uptime-kuma
                  port: 3001
        YAML

    - name: Add uptime DNS entry to /etc/hosts
      become: yes
      lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 uptime.local"
        state: present

    - name: Check Uptime Kuma pods
      shell: kubectl get pods -n tools
      register: uptime_pods

    - name: Show Uptime Kuma pods
      debug:
        msg: "{{ uptime_pods.stdout }}"
