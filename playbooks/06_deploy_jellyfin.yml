---
- name: Redeploy Jellyfin with correct media path
  hosts: homelab
  become: no

  tasks:
    - name: Uninstall existing Jellyfin
      shell: helm uninstall jellyfin -n media

    - name: Wait for pod to terminate
      shell: kubectl wait --for=delete pod -l app.kubernetes.io/name=jellyfin -n media --timeout=60s
      ignore_errors: yes

    - name: Delete old PVCs
      shell: |
        kubectl delete pvc jellyfin-media -n media --ignore-not-found=true
        kubectl delete pvc jellyfin-config -n media --ignore-not-found=true

    - name: Deploy Jellyfin with hostPath
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: jellyfin
          namespace: media
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: jellyfin
          template:
            metadata:
              labels:
                app: jellyfin
            spec:
              containers:
                - name: jellyfin
                  image: jellyfin/jellyfin:latest
                  ports:
                    - containerPort: 8096
                  volumeMounts:
                    - name: config
                      mountPath: /config
                    - name: media
                      mountPath: /media
              volumes:
                - name: config
                  hostPath:
                    path: /mnt/jellyfin/config
                    type: Directory
                - name: media
                  hostPath:
                    path: /mnt/media
                    type: Directory
        YAML

    - name: Create Jellyfin service
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: v1
        kind: Service
        metadata:
          name: jellyfin
          namespace: media
        spec:
          selector:
            app: jellyfin
          ports:
            - port: 8096
              targetPort: 8096
          type: ClusterIP
        YAML

    - name: Create Jellyfin IngressRoute
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: jellyfin
          namespace: media
        spec:
          entryPoints:
            - web
          routes:
            - match: Host(\`jellyfin.local\`)
              kind: Rule
              services:
                - name: jellyfin
                  port: 8096
        YAML

    - name: Wait for Jellyfin to be ready
      shell: kubectl wait --for=condition=ready pod -l app=jellyfin -n media --timeout=120s

    - name: Verify media mount
      shell: kubectl exec -n media $(kubectl get pods -n media -l app=jellyfin -o jsonpath='{.items[0].metadata.name}') -- ls /media

    - name: Show media contents
      debug:
        msg: "Media folder contents verified"

    - name: Check pods
      shell: kubectl get pods -n media
      register: pods

    - name: Show pods
      debug:
        msg: "{{ pods.stdout }}"
