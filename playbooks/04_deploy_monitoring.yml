---
- name: Deploy Prometheus and Grafana
  hosts: homelab
  become: no

  tasks:
    - name: Deploy Prometheus + Grafana stack
      shell: |
        helm upgrade --install kube-prometheus-stack \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.adminPassword=homelab123 \
          --set grafana.service.type=ClusterIP \
          --set prometheus.service.type=ClusterIP \
          --set alertmanager.enabled=false \
          --set kubeStateMetrics.enabled=true \
          --set nodeExporter.enabled=true \
          --wait --timeout 5m

    - name: Create Grafana Traefik IngressRoute
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: grafana
          namespace: monitoring
        spec:
          entryPoints:
            - web
          routes:
            - match: Host(\`grafana.local\`)
              kind: Rule
              services:
                - name: kube-prometheus-stack-grafana
                  port: 80
        YAML

    - name: Create Prometheus Traefik IngressRoute
      shell: |
        kubectl apply -f - <<YAML
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: prometheus
          namespace: monitoring
        spec:
          entryPoints:
            - web
          routes:
            - match: Host(\`prometheus.local\`)
              kind: Rule
              services:
                - name: kube-prometheus-stack-prometheus
                  port: 9090
        YAML

    - name: Add local DNS entries to /etc/hosts
      become: yes
      lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ item }}"
        state: present
      loop:
        - grafana.local
        - prometheus.local

    - name: Check monitoring pods
      shell: kubectl get pods -n monitoring
      register: monitoring_pods

    - name: Show monitoring pods
      debug:
        msg: "{{ monitoring_pods.stdout }}"
